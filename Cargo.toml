[package]
name = "anvil-reth"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
reth-ethereum = { git = "https://github.com/paradigmxyz/reth", features = ["node", "node-api", "test-utils"] }
reth-rpc-eth-api = { git = "https://github.com/paradigmxyz/reth" }
reth-rpc-eth-types = { git = "https://github.com/paradigmxyz/reth" }
reth-rpc-traits = "0.3"
reth-transaction-pool = { git = "https://github.com/paradigmxyz/reth" }

alloy-consensus = "2"
alloy-dyn-abi = "1.5"
alloy-eips = "2"
alloy-network = "2"
jsonrpsee = { version = "0.26", features = ["server", "macros"] }
alloy-primitives = "1.5"
alloy-rpc-types-engine = "2"
alloy-rpc-types-eth = "2"
alloy-signer = "2"
tokio = { version = "1", features = ["full"] }
eyre = "0.6"

[dev-dependencies]
serde_json = "1"
